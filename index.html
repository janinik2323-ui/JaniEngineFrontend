<style>
audio, video {
    display: none !important;
}
</style>

<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Jani Engine</title>

    <link href="https://fonts.googleapis.com/css2?family=Saira+SemiCondensed:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <noscript>Your browser does not support JavaScript.</noscript>
</head>

<body class="light">

    <!-- LOADING -->
    <div id="loadingScreen">
        <div id="loadingBox"></div>
        <div id="loadingJ">J</div>
    </div>

    <!-- THEME BUTTON -->
    <button id="themeToggle" class="theme-btn">☀ / 🌙</button>

    <!-- JANI ENGINE TITLE -->
    <div id="janiTitle">
        <span class="jani">JANI</span>
        <span class="engine">ENGINE</span>
    </div>

    <!-- HOME SCREEN -->
    <div id="homeScreen" class="home-screen">

        <input id="searchInput" type="text" placeholder="Search anything…" class="search-input">

        <div class="tabs">
            <span class="tab">Web</span>
            <span class="tab">Images</span>
            <span class="tab">Videos</span>
            <span class="tab">News</span>
        </div>

        <button id="searchBtn" class="search-btn">Search</button>
    </div>

    <!-- TOP BAR -->
    <div id="topBar" style="display:none;">
        <input id="searchInputTop" placeholder="Search..." />
        <div id="sectionButtons">
            <button id="imagesBtnTop">Images</button>
            <button id="videosBtnTop">Videos</button>
        </div>
    </div>

    <!-- SAFE RESULTS WRAPPER -->
    <div id="safeWrapper" data-clean="true">

        <div id="webResults" class="web-results safe-html"></div>

        <h2 id="imagesTitle" style="display:none;">Images</h2>
        <div id="imagesSection" class="image-grid"></div>

        <h2 id="videosTitle" style="display:none;">Videos</h2>
        <div id="videosSection" class="video-grid"></div>

    </div>

    <!-- FULLSCREEN ZOOM -->
    <div id="zoomOverlay">
        <div id="zoomContent">
            <img id="zoomImg" />
            <video id="zoomVideo" controls></video>
            <a id="downloadBtn" download>Download</a>
        </div>
    </div>

    <!-- SERVER DOWN POPUP + TERMINAL -->
    <div id="serverDownOverlay">
        <div id="serverDownBox">
            <h2>JANI ENGINE</h2>
            <p>
                Server is currently unavailable.<br>
                Please wait until the backend service is restored.<br>
                We are working to resolve the issue as quickly as possible.
            </p>

            <div id="devPreview">
                <div id="devTitle">Developer's Preview</div>
                <div id="devTerminal"></div>
            </div>

            <button id="closeServerDown">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
